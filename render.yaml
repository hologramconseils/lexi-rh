databases:
  - name: lexi-rh-db
    plan: free
    databaseName: lexi_rh
    user: lexi_user
    region: frankfurt

services:
  - type: web
    name: lexi-rh-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lexi-rh-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://rh.hologramconseils.com
      - key: PYTHON_VERSION
        value: 3.11.6
